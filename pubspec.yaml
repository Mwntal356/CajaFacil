name: cajafacil
description: Aplicación de Punto de Venta Premium para pequeños negocios.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Estado
  flutter_riverpod: ^2.5.1
  
  # Navegación
  go_router: ^13.2.0
  
  # Base de Datos (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Estilo
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  animate_do: ^3.3.4
  lucide_icons: 0.257.0
  
  # Funcionalidad
  fl_chart: ^0.66.0
  mobile_scanner: ^4.0.1
  # speech_to_text: ^6.6.0
  local_auth: ^2.1.8
  image_picker: ^1.0.7
  intl: ^0.19.0
  google_generative_ai: ^0.2.2
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  path: ^1.9.1
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
